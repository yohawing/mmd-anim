name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Workspace checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check FFI header symbols
        run: python tools/check_ffi_header_symbols.py

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check lightweight builds
        run: |
          cargo check -p mmd-anim-physics-bullet --no-default-features
          cargo test -p mmd-anim-cli -p mmd-anim-ffi --no-default-features

  python-ffi:
    name: Python FFI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check Python ABI drift
        run: python tools/check_python_abi_drift.py

      - name: Configure MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Check model descriptor ABI layout (MSVC)
        if: runner.os == 'Windows'
        env:
          CC: cl
        run: python tools/check_model_descriptor_abi.py --require-c-compiler

      - name: Check model descriptor ABI layout (GCC)
        if: runner.os != 'Windows'
        env:
          CC: gcc
        run: python tools/check_model_descriptor_abi.py --require-c-compiler

      - name: Build release C ABI library
        run: cargo build -p mmd-anim-ffi --release

      - name: Run Python binding tests with native library
        run: python -m unittest discover -s bindings/python/tests -v
