name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build docs
        run: cargo doc --workspace --no-deps

      - name: Audit package contents
        run: |
          cargo package -p mmd-anim-runtime --list
          cargo package -p mmd-anim-format --list
          cargo package -p mmd-anim --list

      - name: Dry-run dependency-free crate
        run: cargo publish -p mmd-anim-runtime --dry-run

  publish:
    name: Publish crates.io packages
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Confirm crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN GitHub secret is not configured."
            exit 1
          fi

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          crate_exists() {
            local crate="$1"
            local version="$2"
            cargo search "$crate" --limit 1 | grep -Eq "^${crate} = \"${version}\""
          }

          publish_crate() {
            local package="$1"
            local version="${GITHUB_REF_NAME#v}"

            if crate_exists "$package" "$version"; then
              echo "${package} ${version} already exists on crates.io; skipping."
              return 0
            fi

            cargo publish -p "$package"

            for attempt in {1..30}; do
              if crate_exists "$package" "$version"; then
                echo "${package} ${version} is visible in the crates.io index."
                return 0
              fi

              echo "Waiting for ${package} ${version} to appear in crates.io index (${attempt}/30)."
              sleep 10
            done

            echo "${package} ${version} did not appear in the crates.io index in time."
            exit 1
          }

          publish_crate mmd-anim-runtime
          publish_crate mmd-anim-format
          publish_crate mmd-anim
