name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run shared native Python/C ABI release gate
        run: python tools/check_python_ffi_release.py

      - name: Check lightweight builds
        run: |
          cargo check -p mmd-anim-physics-bullet --no-default-features
          cargo test -p mmd-anim-cli -p mmd-anim-ffi --no-default-features

      - name: Build docs
        run: cargo doc --workspace --no-deps

      - name: Audit package contents
        run: |
          cargo package -p mmd-anim-runtime --list
          cargo package -p mmd-anim-format --list
          cargo package -p mmd-anim-physics-bullet --list
          cargo package -p mmd-anim --list
          cargo package -p mmd-anim-cli --list

      - name: Dry-run dependency-free crate
        run: cargo publish -p mmd-anim-runtime --dry-run

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: checks
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mmd-anim-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mmd-anim-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p mmd-anim-cli --release --locked --target ${{ matrix.target }}

      - name: Package CLI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/release/mmd-anim" staging/
          tar -C staging -czf "dist/${{ matrix.archive }}" mmd-anim

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, staging | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\mmd-anim.exe" staging\
          Compress-Archive -Path "staging\*" -DestinationPath "dist\${{ matrix.archive }}" -Force

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  build-cli-macos-universal:
    name: Build CLI (universal-apple-darwin)
    needs: checks
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build CLI (x86_64)
        run: cargo build -p mmd-anim-cli --release --locked --target x86_64-apple-darwin

      - name: Build CLI (aarch64)
        run: cargo build -p mmd-anim-cli --release --locked --target aarch64-apple-darwin

      - name: Package CLI (macOS universal)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist staging
          lipo -create \
            "target/x86_64-apple-darwin/release/mmd-anim" \
            "target/aarch64-apple-darwin/release/mmd-anim" \
            -output staging/mmd-anim
          lipo staging/mmd-anim -verify_arch x86_64 arm64
          tar -C staging -czf "dist/mmd-anim-${{ github.ref_name }}-universal-apple-darwin.tar.gz" mmd-anim

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-universal-apple-darwin
          path: dist/mmd-anim-${{ github.ref_name }}-universal-apple-darwin.tar.gz
          if-no-files-found: error

  release-cli:
    name: Publish CLI release assets
    needs: [build-cli, build-cli-macos-universal]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## " version "([[:space:]]|$)" { found = 1; next }
            found && $0 ~ "^## " { exit }
            found { print }
            END { if (!found) exit 2 }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "CHANGELOG.md section for ${version} is missing or empty."
            exit 1
          fi

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi

          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  publish:
    name: Publish crates.io packages
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Confirm crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN GitHub secret is not configured."
            exit 1
          fi

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          crate_exists() {
            local crate="$1"
            local version="$2"
            cargo search "$crate" --limit 1 | grep -Eq "^${crate} = \"${version}\""
          }

          publish_crate() {
            local package="$1"
            local version="${GITHUB_REF_NAME#v}"

            if crate_exists "$package" "$version"; then
              echo "${package} ${version} already exists on crates.io; skipping."
              return 0
            fi

            cargo publish -p "$package"

            for attempt in {1..30}; do
              if crate_exists "$package" "$version"; then
                echo "${package} ${version} is visible in the crates.io index."
                return 0
              fi

              echo "Waiting for ${package} ${version} to appear in crates.io index (${attempt}/30)."
              sleep 10
            done

            echo "${package} ${version} did not appear in the crates.io index in time."
            exit 1
          }

          publish_crate mmd-anim-runtime
          publish_crate mmd-anim-format
          publish_crate mmd-anim-physics-bullet
          publish_crate mmd-anim
          publish_crate mmd-anim-cli
