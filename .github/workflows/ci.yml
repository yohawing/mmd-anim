name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Workspace checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check FFI header symbols
        run: python tools/check_ffi_header_symbols.py

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check lightweight builds
        run: |
          cargo check -p mmd-anim-physics-bullet --no-default-features
          cargo test -p mmd-anim-cli -p mmd-anim-ffi --no-default-features
