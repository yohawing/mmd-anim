name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build docs
        run: cargo doc --workspace --no-deps

      - name: Audit package contents
        run: |
          cargo package -p mmd-anim-runtime --list
          cargo package -p mmd-anim-format --list
          cargo package -p mmd-anim --list

      - name: Dry-run dependency-free crate
        run: cargo publish -p mmd-anim-runtime --dry-run

  publish:
    name: Publish crates.io packages
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Confirm crates.io token
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN GitHub secret is not configured."
            exit 1
          fi

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          wait_for_crate() {
            local crate="$1"
            local version="$2"
            for attempt in {1..60}; do
              if curl -fsS "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
                return 0
              fi
              echo "Waiting for ${crate} ${version} to appear on crates.io (${attempt}/60)..."
              sleep 10
            done
            echo "${crate} ${version} did not appear on crates.io in time."
            exit 1
          }

          cargo publish -p mmd-anim-runtime
          wait_for_crate mmd-anim-runtime "$version"

          cargo publish -p mmd-anim-format
          wait_for_crate mmd-anim-format "$version"

          cargo publish -p mmd-anim
          wait_for_crate mmd-anim "$version"
